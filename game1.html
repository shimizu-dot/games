<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スイカゲーム</title>
    <style>
    :root {
      color-scheme: light;
      --bg-top: #fff8e8;
      --bg-bottom: #f8d48a;
      --panel: rgba(255, 255, 255, 0.9);
      --ink: #1f2937;
      --muted: #6b7280;
      --accent: #f97316;
      --accent-strong: #ea580c;
      --line: #f59e0b;
      --line-soft: rgba(245, 158, 11, 0.28);
    }
    * { box-sizing: border-box; }
    html {
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.75), transparent 32%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 16px;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.84), transparent 30%),
        radial-gradient(circle at 20% 80%, rgba(249, 115, 22, 0.12), transparent 22%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      color: var(--ink);
      overflow-x: hidden;
    }
    .wrap {
      width: min(100%, 920px);
      background: linear-gradient(180deg, rgba(255,255,255,0.96), var(--panel));
      border: 1px solid rgba(245, 158, 11, 0.42);
      border-radius: 22px;
      padding: 18px;
      box-shadow:
        0 24px 60px rgba(120, 74, 14, 0.18),
        0 2px 0 rgba(255, 255, 255, 0.6) inset;
      backdrop-filter: blur(10px);
    }
    .content {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 210px;
      gap: 16px;
      align-items: start;
    }
    .board { min-width: 0; }
    .side {
      border: 1px solid rgba(251, 191, 36, 0.45);
      border-radius: 16px;
      background: linear-gradient(180deg, #fffdf7 0%, #fff5df 100%);
      padding: 14px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.85),
        0 10px 22px rgba(120, 74, 14, 0.08);
    }
    .side h2 {
      margin: 0 0 10px;
      font-size: 16px;
      color: #b45309;
    }
    .fruit-list {
      display: grid;
      gap: 5px;
    }
    .fruit-item {
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 5px;
      align-items: center;
      font-size: 13px;
      line-height: 1.3;
      color: #78350f;
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(255,255,255,0.55);
    }
    .fruit-thumb {
      width: 20px;
      height: 20px;
      object-fit: contain;
      display: block;
      border-radius: 5px;
      background: rgba(255,255,255,0.68);
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 2px 5px rgba(0,0,0,0.10);
    }
    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .title {
      font-weight: 800;
      font-size: clamp(20px, 3.2vw, 24px);
      letter-spacing: 0.02em;
      color: #b45309;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 10px 12px;
      font-weight: 700;
      flex-wrap: wrap;
      color: var(--muted);
    }
    .btn {
      border: none;
      background: linear-gradient(180deg, #fb923c, var(--accent-strong));
      color: #fff;
      font-weight: 700;
      border-radius: 999px;
      padding: 9px 14px;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(249, 115, 22, 0.22);
    }
    .btn:hover { filter: brightness(1.03); }
    .btn:active { transform: translateY(1px); }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: linear-gradient(#fffbeb, #fef9c3);
      border: 3px solid #f59e0b;
      border-radius: 14px;
      touch-action: none;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.35) inset,
        0 10px 20px rgba(180, 120, 20, 0.12);
    }
    .hint {
      margin-top: 10px;
      color: #92400e;
      font-size: 14px;
      line-height: 1.6;
    }
    @media (max-width: 760px) {
      body { padding: 10px; }
      .wrap {
        padding: 14px;
        border-radius: 18px;
      }
      .content {
        grid-template-columns: 1fr;
      }
      .head {
        align-items: flex-start;
        flex-direction: column;
      }
      .stat {
        width: 100%;
        justify-content: space-between;
        gap: 8px;
      }
      .btn {
        width: 100%;
        padding: 10px 12px;
      }
      .side {
        order: 2;
      }
      .hint {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="title">スイカゲーム</div>
      <div class="stat">
        <span>Score: <span id="score">0</span></span>
        <span>Best: <span id="best">0</span></span>
        <button class="btn" id="restartBtn">リスタート</button>
        <button class="btn" id="exitBtn">終了</button>
      </div>
    </div>
    <div class="content">
      <div class="board">
        <canvas id="game" width="500" height="480" aria-label="スイカゲーム"></canvas>
        <div class="hint">左右に動かしてタップ/クリックで落下。同じ果物をくっつけると進化します。</div>
      </div>
      <aside class="side" aria-label="果物の説明">
        <h2>果物の説明</h2>
        <div class="fruit-list" id="fruitList"></div>
      </aside>
    </div>
  </div>

      function escapeXml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function shade(hex, pct) {
        const raw = hex.replace("#", "");
        const num = parseInt(raw, 16);
        const r = (num >> 16) & 255;
        const g = (num >> 8) & 255;
        const b = num & 255;
        const t = pct < 0 ? 0 : 255;
        const p = Math.abs(pct);
        const rr = Math.round((t - r) * p + r);
        const gg = Math.round((t - g) * p + g);
        const bb = Math.round((t - b) * p + b);
        return `rgb(${rr},${gg},${bb})`;
      }

                    <ellipse cx="97" cy="95" rx="25" ry="19" fill="url(#pineShine)" opacity="0.8" />

                    <path d="M120 28 C108 17, 98 12, 85 10 C95 26, 101 37, 120 44" fill="#22c55e" />

              `;
            case 8:
              return `

                  <g filter="url(#shadow)">

                    <g opacity="0.38" stroke="#bbf7d0" stroke-width="2.5" fill="none">
                      <path d="M58 100 C79 83, 108 74, 143 77 C162 79, 179 85, 192 95" />
                      <path d="M49 124 C74 110, 104 103, 140 105 C163 106, 181 112, 194 121" />
                      <path d="M55 147 C81 136, 111 131, 144 133 C166 135, 181 140, 190 147" />
                      <path d="M69 168 C92 159, 121 156, 150 158 C169 159, 182 163, 186 169" />

                </svg>
              `;
            case 9:
            default:
              return `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${view} ${view}">
                  <defs>
                    <radialGradient id="watermelon" cx="32%" cy="26%" r="72%">
                      <stop offset="0%" stop-color="#6ee7b7" />
                      <stop offset="46%" stop-color="#22c55e" />
                      <stop offset="100%" stop-color="#166534" />
                    </radialGradient>
                    <radialGradient id="waterShine" cx="30%" cy="24%" r="28%">
                      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
                      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
                    </radialGradient>
                    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
                      <feDropShadow dx="0" dy="10" stdDeviation="7" flood-color="#000000" flood-opacity="0.22" />

                  </defs>
                  <g filter="url(#shadow)">
                    <circle cx="120" cy="122" r="70" fill="url(#watermelon)" />
                    <ellipse cx="94" cy="94" rx="28" ry="22" fill="url(#waterShine)" opacity="0.72" />
                    <path d="M118 48 C118 38, 121 30, 127 24" stroke="#7c4a1e" stroke-width="7" stroke-linecap="round" fill="none" />
                    <path d="M127 24 C140 18, 151 20, 160 29 C146 33, 136 32, 127 24 Z" fill="#65a30d" opacity="0.95" />
                    <g opacity="0.65" stroke="#14532d" stroke-width="6" fill="none">
                      <path d="M70 72 C92 60, 112 56, 130 57" />
                      <path d="M60 102 C88 94, 116 92, 144 96" />
                      <path d="M57 134 C84 126, 114 124, 152 129" />
                      <path d="M67 166 C92 160, 123 160, 157 165" />
                    </g>
                    <g fill="#86efac" opacity="0.12">
                      <circle cx="90" cy="86" r="4" />
                      <circle cx="126" cy="76" r="4" />
                      <circle cx="150" cy="106" r="4" />

        return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
      }

      function makeFruitSprite(src) {
        const img = new Image();
        img.src = src;
        return img;
      }

      let bodies = [];
      let score = 0;
      let best = Number(localStorage.getItem("suika-best") || 0);
      let pointerX = W / 2;
      let currentLevel = randSpawnLevel();
      let nextLevel = randSpawnLevel();
      let cooldown = 0;
      let gameOver = false;
      let overTimer = 0;
      let lastTs = 0;

      bestEl.textContent = String(best);
      const fruitListEl = document.getElementById("fruitList");
      fruitListEl.innerHTML = FRUITS.map((fruit, index) => `
        <div class="fruit-item">
          <img class="fruit-thumb" src="${FRUIT_IMAGE_SOURCES[index]}" alt="${fruit.name}">
          <span>${fruit.name}</span>
        </div>
      `).join("");

      function randSpawnLevel() {
        return Math.floor(Math.random() * 4);
      }

      function createFruit(level, x, y, isFresh = false) {
        const f = FRUITS[level];
        return {
          id: crypto.randomUUID(),
          level,
          x,
          y,
          vx: 0,
          vy: 0,
          angle: Math.random() * Math.PI * 2,
          spin: 0,
          rotated: 0,
          r: f.r,
          fresh: isFresh,
          alive: true
        };
      }

      function addScore(v) {
        score += v;
        scoreEl.textContent = String(score);
        if (score > best) {
          best = score;
          bestEl.textContent = String(best);
          localStorage.setItem("suika-best", String(best));
        }
      }

      function dropFruit() {
        if (gameOver || cooldown > 0 || bodies.length >= maxBodies) return;
        const r = FRUITS[currentLevel].r;
        const x = clamp(pointerX, wall + r, W - wall - r);
        bodies.push(createFruit(currentLevel, x, spawnY, true));
        currentLevel = nextLevel;
        nextLevel = randSpawnLevel();
        cooldown = cooldownSec;
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function physics(dt) {
        for (const b of bodies) {
          b.vy += gravity * dt;
          b.vx *= friction;
          b.vy *= damping;
          b.x += b.vx * dt;
          b.y += b.vy * dt;

          const onFloor = b.y + b.r >= H - wall - 0.5;
          const lowMotion = Math.abs(b.vx) < 10 && Math.abs(b.vy) < 18;

          const spinCap = Math.PI * 2 * 1;
          const angleStep = b.spin * dt * 0.52;
          b.angle += angleStep;
          b.rotated += Math.abs(angleStep);
          if (b.rotated >= spinCap) {
            b.rotated = spinCap;
            b.spin = 0;
          } else {
            b.spin *= onFloor ? 0.83 : 0.955;
            if (onFloor && lowMotion) {
              b.spin *= 0.30;
            }
            if (Math.abs(b.spin) < 0.04 && lowMotion) {
              b.spin = 0;
            }
          }

          if (b.x - b.r < wall) {
            b.x = wall + b.r;
            b.vx *= -0.25;
            b.spin += b.vy * 0.0025;
          }
          if (b.x + b.r > W - wall) {
            b.x = W - wall - b.r;
            b.vx *= -0.25;
            b.spin += b.vy * 0.0025;
          }
          if (b.y + b.r > H - wall) {
            b.y = H - wall - b.r;
            b.vy *= -0.2;
            b.spin += b.vx * 0.003;
          }
        }

        // Simple circle collision + merge handling.
        for (let i = 0; i < bodies.length; i++) {
          const a = bodies[i];
          if (!a.alive) continue;
          for (let j = i + 1; j < bodies.length; j++) {
            const b = bodies[j];
            if (!b.alive) continue;
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const rr = a.r + b.r;
            const distSq = dx * dx + dy * dy;
            if (distSq >= rr * rr) continue;

            const dist = Math.sqrt(distSq) || 0.0001;
            const nx = dx / dist;
            const ny = dy / dist;
            const overlap = rr - dist;
            const push = overlap * 0.5;
            a.x -= nx * push;
            a.y -= ny * push;
            b.x += nx * push;
            b.y += ny * push;

            const relVx = b.vx - a.vx;
            const relVy = b.vy - a.vy;
            const sepSpeed = relVx * nx + relVy * ny;
            const tx = -ny;
            const ty = nx;
            const tangSpeed = relVx * tx + relVy * ty;
            if (sepSpeed < 0) {
              const impulse = -sepSpeed * 0.5;
              a.vx -= impulse * nx;
              a.vy -= impulse * ny;
              b.vx += impulse * nx;
              b.vy += impulse * ny;
            }
            const rollImpulse = clamp(tangSpeed * 0.013, -0.75, 0.75);
            a.spin -= rollImpulse * 0.35;
            b.spin += rollImpulse * 0.28;

            if (a.level === b.level && !a.fresh && !b.fresh) {
              const nxLevel = Math.min(a.level + 1, FRUITS.length - 1);
              const mx = (a.x + b.x) * 0.5;
              const my = (a.y + b.y) * 0.5;
              a.alive = false;
              b.alive = false;
              bodies.push(createFruit(nxLevel, mx, my, true));
              addScore(FRUITS[nxLevel].score);
            }
          }
        }

        bodies = bodies.filter((b) => b.alive);
        for (const b of bodies) b.fresh = false;
      }

      function updateGameOver(dt) {
        let touchingLine = false;
        for (const b of bodies) {
          if (b.y - b.r < topLineY) {
            touchingLine = true;
            break;
          }
        }
        if (touchingLine) overTimer += dt;
        else overTimer = Math.max(0, overTimer - dt * 2);
        if (overTimer > 1.2) gameOver = true;
      }

      function drawFruit(level, x, y, angle = 0) {
        const f = FRUITS[level];
        const img = fruitSprites[level];
        const size = f.r * 2.15;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        if (img && img.complete && img.naturalWidth > 0) {
          ctx.drawImage(img, -size / 2, -size / 2, size, size);
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, f.r, 0, Math.PI * 2);
          ctx.fillStyle = f.color;
          ctx.fill();
        }
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        ctx.fillStyle = "#fefce8";
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = "rgba(245, 158, 11, 0.16)";
        ctx.fillRect(0, 0, W, topLineY);
        ctx.beginPath();
        ctx.moveTo(wall, topLineY);
        ctx.lineTo(W - wall, topLineY);
        ctx.strokeStyle = "#f97316";
        ctx.setLineDash([8, 8]);
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.lineWidth = wall * 2;
        ctx.strokeStyle = "#f59e0b";
        ctx.strokeRect(wall, wall, W - wall * 2, H - wall * 2);

        for (const b of bodies) {
          drawFruit(b.level, b.x, b.y, b.angle);
        }

        if (!gameOver) {
          const ghostR = FRUITS[currentLevel].r;
          const gx = clamp(pointerX, wall + ghostR, W - wall - ghostR);
          ctx.globalAlpha = 0.4;
          drawFruit(currentLevel, gx, spawnY, 0);
          ctx.globalAlpha = 1;

          ctx.fillStyle = "#7c2d12";
          ctx.font = "bold 15px sans-serif";
          ctx.fillText("Next", W - 78, 34);
          ctx.save();
          ctx.translate(W - 45, 65);
          const n = fruitSprites[nextLevel];
          const previewSize = FRUITS[nextLevel].r * 0.95 * 2;
          if (n && n.complete && n.naturalWidth > 0) {
            ctx.drawImage(n, -previewSize / 2, -previewSize / 2, previewSize, previewSize);
          } else {
            ctx.beginPath();
            ctx.arc(0, 0, FRUITS[nextLevel].r * 0.48, 0, Math.PI * 2);
            ctx.fillStyle = FRUITS[nextLevel].color;
            ctx.fill();
          }
          ctx.restore();
        }

        if (gameOver) {
          ctx.fillStyle = "rgba(0,0,0,0.4)";
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = "#fff";
          ctx.textAlign = "center";
          ctx.font = "bold 46px sans-serif";
          ctx.fillText("GAME OVER", W / 2, H / 2 - 24);
          ctx.font = "bold 24px sans-serif";
          ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 20);
          ctx.font = "18px sans-serif";
          ctx.fillText("リスタートで再挑戦", W / 2, H / 2 + 56);
          ctx.textAlign = "start";
        }
      }

      function frame(ts) {
        if (!lastTs) lastTs = ts;
        let dt = (ts - lastTs) / 1000;
        lastTs = ts;
        dt = Math.min(dt, 0.033);

        if (!gameOver) {
          cooldown = Math.max(0, cooldown - dt);
          const step = 1 / 120;
          let acc = dt;
          while (acc > 0) {
            const tick = Math.min(step, acc);
            physics(tick);
            updateGameOver(tick);
            acc -= tick;
          }
        }

        draw();
        requestAnimationFrame(frame);
      }

      function setPointer(clientX) {
        const rect = canvas.getBoundingClientRect();
        const x = ((clientX - rect.left) / rect.width) * W;
        pointerX = clamp(x, wall + 8, W - wall - 8);
      }

      function resetGame() {
        bodies = [];
        score = 0;
        scoreEl.textContent = "0";
        pointerX = W / 2;
        currentLevel = randSpawnLevel();
        nextLevel = randSpawnLevel();
        cooldown = 0;
        gameOver = false;
        overTimer = 0;
      }

      canvas.addEventListener("mousemove", (e) => setPointer(e.clientX));
      canvas.addEventListener("click", dropFruit);
      canvas.addEventListener("touchmove", (e) => {
        if (!e.touches[0]) return;
        setPointer(e.touches[0].clientX);
      }, { passive: true });
      canvas.addEventListener("touchstart", (e) => {
        if (!e.touches[0]) return;
        setPointer(e.touches[0].clientX);
        dropFruit();
      }, { passive: true });

      window.addEventListener("keydown", (e) => {
        if (e.code === "ArrowLeft") pointerX -= 24;
        if (e.code === "ArrowRight") pointerX += 24;
        if (e.code === "Space" || e.code === "Enter") {
          e.preventDefault();
          dropFruit();
        }
      });

      restartBtn.addEventListener("click", resetGame);
      exitBtn.addEventListener("click", () => {
        window.location.href = "index.html";
      });

      resetGame();
      requestAnimationFrame(frame);
    })();
  </script>
