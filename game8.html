<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>危機一髪風ゲーム</title>
  <style>
:root {
  --bg1: #eaf6ff;
  --bg2: #d3ecff;
  --line: #cfe2f8;
  --accent: #1a6fb0;
  --text: #123353;
  --surface: #ffffff;
  --panel-bg: #f5faff;
  --panel-border: #cfe2f8;
  --muted: #3a5a7a;
  --wood-a: #d8a25e;
  --wood-b: #a8703a;
  --wood-band: #6b4423;
  --hole-bg: #241a12;
  --hole-border: #4a3424;
  --btn-border: #1a5fb6;
  --btn-grad-a: #2d83f1;
  --btn-grad-b: #1c6fd8;
  --toggle-off-a: #9aa5b1;
  --toggle-off-b: #798392;
  --toggle-off-border: #6b7684;
  --win-bg: #fff3e0;
  --win-border: #e8b96a;
  --win-text: #8a5a1f;
  --player-badge-bg: #ffffff;
  --player-badge-border: #cfe2f8;
}

:root[data-theme="dark"] {
  --bg1: #0a1524;
  --bg2: #050b16;
  --line: #21456c;
  --accent: #5aa9e6;
  --text: #d7e6f5;
  --surface: #101f33;
  --panel-bg: #12233a;
  --panel-border: #21456c;
  --muted: #9db7d2;
  --wood-a: #a8703a;
  --wood-b: #6b4423;
  --wood-band: #3a2712;
  --hole-bg: #05070a;
  --hole-border: #2a1e12;
  --btn-border: #5aa9e6;
  --toggle-off-a: #45505e;
  --toggle-off-b: #333d49;
  --toggle-off-border: #29323c;
  --win-bg: #3a2f14;
  --win-border: #8a7530;
  --win-text: #ffdf8a;
  --player-badge-bg: #142a44;
  --player-badge-border: #285080;
}

* { box-sizing: border-box; }

[hidden] { display: none !important; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Hiragino Gothic ProN", "Yu Gothic", sans-serif;
  background: linear-gradient(160deg, var(--bg1), var(--bg2));
  color: var(--text);
  display: grid;
  place-items: start center;
  padding: 14px;
  transition: background 200ms ease, color 200ms ease;
}

.game {
  width: min(340px, 100%);
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 12px;
  box-shadow: 0 10px 24px rgba(25, 82, 145, 0.12);
  padding: 10px;
  transition: background 200ms ease, border-color 200ms ease;
}

h1 {
  margin: 0 0 6px;
  font-size: 15px;
}

h2 {
  margin: 0 0 10px;
  font-size: 14px;
  color: var(--accent);
  text-align: center;
}

.controls {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 8px;
}

button {
  border: 1px solid var(--btn-border);
  background: linear-gradient(180deg, var(--btn-grad-a), var(--btn-grad-b));
  color: #fff;
  border-radius: 8px;
  font-weight: 700;
  padding: 6px 11px;
  cursor: pointer;
  font-size: 12px;
}

button:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.icon-btn {
  width: 30px;
  height: 30px;
  padding: 0;
  font-size: 14px;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}

.toggle-btn.off {
  background: linear-gradient(180deg, var(--toggle-off-a), var(--toggle-off-b));
  border-color: var(--toggle-off-border);
}

.stage {
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: 10px;
  padding: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.player-count-row {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  justify-content: center;
}

.count-btn {
  width: 34px;
  height: 34px;
  padding: 0;
  font-size: 13px;
  border-radius: 50%;
  background: var(--surface);
  color: var(--accent);
}

.count-btn.selected {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

#startGameBtn {
  padding: 8px 18px;
  font-size: 13px;
}

.turn-banner {
  font-size: 13px;
  font-weight: 900;
  color: var(--accent);
  min-height: 18px;
  text-align: center;
}

.players-row {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  justify-content: center;
}

.player-badge {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 7px;
  border-radius: 999px;
  background: var(--player-badge-bg);
  border: 2px solid var(--player-badge-border);
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
}

.player-badge .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.player-badge.active {
  border-color: var(--accent);
  color: var(--text);
  box-shadow: 0 0 0 2px rgba(26, 111, 176, 0.2);
}

.barrel-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.rotate-btn {
  width: 26px;
  height: 26px;
  padding: 0;
  font-size: 11px;
  line-height: 1;
  border-radius: 50%;
  flex: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.barrel-stage {
  position: relative;
  width: 240px;
  height: 300px;
  margin: 4px 0;
  perspective: 900px;
  touch-action: none;
  cursor: grab;
}

.barrel-stage:active {
  cursor: grabbing;
}

.barrel-stage.shake {
  animation: barrel-shake 500ms ease;
}

@keyframes barrel-shake {
  0% { transform: translate(0, 0) rotate(0deg); }
  20% { transform: translate(-6px, 3px) rotate(-2deg); }
  40% { transform: translate(5px, -4px) rotate(2deg); }
  60% { transform: translate(-5px, 4px) rotate(-1deg); }
  80% { transform: translate(4px, -3px) rotate(1deg); }
  100% { transform: translate(0, 0) rotate(0deg); }
}

.barrel3d {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 0;
  height: 0;
  transform-style: preserve-3d;
  will-change: transform;
}

.stave3d {
  position: absolute;
  left: 0;
  top: 50%;
  border: 1px solid var(--wood-band);
  border-left: none;
  border-right: none;
  backface-visibility: hidden;
  background:
    linear-gradient(90deg, rgba(0, 0, 0, 0.4), transparent 22% 78%, rgba(0, 0, 0, 0.4)),
    linear-gradient(180deg, var(--wood-a), var(--wood-b));
}

.hoop3d {
  border-color: #16181b;
  background:
    linear-gradient(90deg, rgba(0, 0, 0, 0.5), transparent 30% 70%, rgba(0, 0, 0, 0.5)),
    linear-gradient(180deg, #9aa0a6, #55595e 45%, #2b2d30);
  box-shadow: 0 0 3px rgba(0, 0, 0, 0.5);
}

.barrel-cap {
  position: absolute;
  left: 0;
  top: 0;
  border-radius: 50%;
  border: 4px solid var(--wood-band);
  background: radial-gradient(ellipse at 38% 38%, var(--wood-a), var(--wood-b) 80%);
  box-shadow: inset 0 0 18px rgba(0, 0, 0, 0.3);
  backface-visibility: hidden;
}

.hole-btn3d {
  position: absolute;
  left: 0;
  top: 0;
  width: 11px;
  height: 24px;
  margin-left: -5.5px;
  margin-top: -12px;
  border-radius: 50%;
  background: radial-gradient(ellipse at 35% 40%, #2a1c10, var(--hole-bg) 75%);
  border: 1.5px solid var(--hole-border);
  padding: 0;
  cursor: pointer;
  box-shadow: inset 0 2px 3px rgba(0, 0, 0, 0.7);
  backface-visibility: hidden;
}

.hole-btn3d:hover:not(:disabled) {
  filter: brightness(1.3);
}

.hole-btn3d:disabled {
  cursor: default;
}

.hole-btn3d .peg {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 7px;
  height: 24px;
  border-radius: 3px;
  transform: translate(-50%, -78%);
  box-shadow: 1px 1px 2px rgba(0, 0, 0, 0.35);
}

.hole-btn3d .peg::before {
  content: "";
  position: absolute;
  left: 50%;
  bottom: -2px;
  width: 16px;
  height: 5px;
  border-radius: 2px;
  background: inherit;
  filter: brightness(0.82);
  transform: translateX(-50%);
}

.barrel-character {
  position: absolute;
  left: 50%;
  top: 50%;
  font-size: 88px;
  transform: translate(-50%, -50%) scale(0);
  opacity: 0;
  pointer-events: none;
  z-index: 5;
  filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.35));
}

.barrel-character.pop {
  animation: character-pop 900ms cubic-bezier(.34, 1.56, .64, 1) forwards;
}

@keyframes character-pop {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  55% { transform: translate(-50%, -130%) scale(1.5); opacity: 1; }
  75% { transform: translate(-50%, -100%) scale(1.25); opacity: 1; }
  100% { transform: translate(-50%, -110%) scale(1.4); opacity: 1; }
}

.holes-remaining {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
}

.result-msg {
  font-size: 13px;
  font-weight: 700;
  min-height: 18px;
  text-align: center;
}

.result-banner {
  margin: 8px 0 0;
  padding: 8px 10px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  text-align: center;
  background: var(--win-bg);
  border: 1px solid var(--win-border);
  color: var(--win-text);
}

.post-game-controls {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-top: 8px;
  flex-wrap: wrap;
}

.help-dialog {
  width: min(560px, 90vw);
  max-height: 80vh;
  overflow-y: auto;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--line);
  border-radius: 14px;
  box-shadow: 0 20px 48px rgba(0, 0, 0, 0.28);
  padding: 20px 22px;
}

.help-dialog::backdrop {
  background: rgba(6, 12, 22, 0.55);
}

.help-dialog h2 {
  margin: 0 0 12px;
  font-size: 20px;
  text-align: left;
}

.help-dialog h3 {
  margin: 16px 0 6px;
  font-size: 15px;
  color: var(--accent);
}

.help-dialog p {
  margin: 0 0 4px;
  font-size: 14px;
  line-height: 1.7;
}

.help-dialog button {
  margin-top: 18px;
}

@media (max-width: 480px) {
  .game { padding: 8px; }
}
  </style>
</head>
<body>
  <main class="game">
    <h1>危機一髪風ゲーム</h1>

    <div class="controls">
      <button id="soundToggleBtn" type="button" class="toggle-btn icon-btn" title="効果音: ON" aria-label="効果音の切り替え">🔊</button>
      <button id="themeToggleBtn" type="button" class="toggle-btn icon-btn" title="ダークモード: OFF" aria-label="ダークモードの切り替え">🌙</button>
      <button id="helpBtn" type="button">📖遊び方</button>
      <button id="restartBtn" type="button">最初から</button>
      <button id="exitBtn" type="button">終了</button>
    </div>

    <section id="setupStage" class="stage">
      <h2>何人でプレイしますか？</h2>
      <div class="player-count-row" id="playerCountRow"></div>
      <button id="startGameBtn" type="button">スタート</button>
    </section>

    <section id="gameStage" class="stage" hidden>
      <div class="turn-banner" id="turnBanner"></div>
      <div class="players-row" id="playersRow"></div>
      <div class="barrel-row">
        <button id="rotateLeftBtn" type="button" class="rotate-btn" aria-label="樽を左に回転">◀</button>
        <div class="barrel-stage" id="barrelStage">
          <div class="barrel3d" id="barrel3d"></div>
          <div class="barrel-character" id="barrelCharacter"></div>
        </div>
        <button id="rotateRightBtn" type="button" class="rotate-btn" aria-label="樽を右に回転">▶</button>
      </div>
      <div class="holes-remaining" id="holesRemaining"></div>
      <div class="result-msg" id="gameMessage" aria-live="polite"></div>
    </section>

    <div id="resultBanner" class="result-banner" hidden></div>
    <div class="post-game-controls" id="postGameControls" hidden>
      <button id="playAgainBtn" type="button">同じ人数でもう一度</button>
      <button id="changeCountBtn" type="button">人数を変更</button>
    </div>
  </main>

  <dialog id="helpDialog" class="help-dialog">
    <h2>遊び方</h2>

    <h3>1. 準備</h3>
    <p>プレイする人数(2〜5人)を選んで「スタート」を押してください。樽の周りに剣を刺す穴が並びます。</p>

    <h3>2. 遊び方</h3>
    <p>プレイヤーは順番に、樽の穴を1つクリック(タップ)して剣を刺していきます。刺した穴には自分の色のピンが残ります。どの穴を刺すと何かが飛び出すかは最初にランダムで決まっていて、誰にも分かりません。</p>

    <h3>3. 決着</h3>
    <p>誰かが「当たりの穴」に剣を刺すと、樽から何かが勢いよく飛び出します。その剣を刺したプレイヤーの負けです!</p>

    <button id="closeHelpBtn" type="button">閉じる</button>
  </dialog>

  <script>
const TOTAL_HOLES = 24;
const PLAYER_COLORS = ["#ff6b6b", "#4dabf7", "#69db7c", "#ffd43b", "#da77f2", "#ff922b", "#63e6be", "#f783ac"];
const POP_CHARACTERS = ["🏴‍☠️", "👻", "🐙", "🎃", "🤡", "🦑", "👹", "🃏"];
const BARREL_R_MID = 104;
const BARREL_R_END = 80;
const BARREL_H = 260;
const BARREL_STAVES = 24;
const BARREL_RINGS = 8;
const BARREL_HOOP_RINGS = [0, 7];

function barrelRadiusAt(y) {
  const t = (y + BARREL_H / 2) / BARREL_H; // 0(上端) 〜 1(下端)
  return BARREL_R_END + (BARREL_R_MID - BARREL_R_END) * Math.sin(Math.PI * t);
}

let playerCount = 4;
let players = [];
let currentPlayerIndex = 0;
let triggerHoleId = -1;
let usedHolesCount = 0;
let holeUsed = [];
let popped = false;

const soundToggleBtn = document.getElementById("soundToggleBtn");
const themeToggleBtn = document.getElementById("themeToggleBtn");
const helpBtn = document.getElementById("helpBtn");
const helpDialog = document.getElementById("helpDialog");
const closeHelpBtn = document.getElementById("closeHelpBtn");
const restartBtn = document.getElementById("restartBtn");
const exitBtn = document.getElementById("exitBtn");
const setupStage = document.getElementById("setupStage");
const gameStage = document.getElementById("gameStage");
const playerCountRow = document.getElementById("playerCountRow");
const startGameBtn = document.getElementById("startGameBtn");
const turnBannerEl = document.getElementById("turnBanner");
const playersRowEl = document.getElementById("playersRow");
const barrelStageEl = document.getElementById("barrelStage");
const barrel3dEl = document.getElementById("barrel3d");
const rotateLeftBtn = document.getElementById("rotateLeftBtn");
const rotateRightBtn = document.getElementById("rotateRightBtn");
const barrelCharacterEl = document.getElementById("barrelCharacter");
const holesRemainingEl = document.getElementById("holesRemaining");
const gameMessageEl = document.getElementById("gameMessage");
const resultBannerEl = document.getElementById("resultBanner");
const postGameControlsEl = document.getElementById("postGameControls");
const playAgainBtn = document.getElementById("playAgainBtn");
const changeCountBtn = document.getElementById("changeCountBtn");

let soundEnabled = localStorage.getItem("barrel_sound_enabled") !== "false";
let audioCtx = null;

function getAudioContext() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function playInsertSound() {
  if (!soundEnabled) return;
  const ctx = getAudioContext();
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  osc.type = "square";
  osc.frequency.setValueAtTime(360, now);
  osc.frequency.exponentialRampToValueAtTime(180, now + 0.1);
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.18, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(now);
  osc.stop(now + 0.12);
}

function playPopSound() {
  if (!soundEnabled) return;
  const ctx = getAudioContext();
  const now = ctx.currentTime;

  const noiseDuration = 0.3;
  const bufferSize = Math.floor(ctx.sampleRate * noiseDuration);
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  }
  const noise = ctx.createBufferSource();
  noise.buffer = buffer;
  const noiseFilter = ctx.createBiquadFilter();
  noiseFilter.type = "highpass";
  noiseFilter.frequency.setValueAtTime(800, now);
  const noiseGain = ctx.createGain();
  noiseGain.gain.setValueAtTime(0.3, now);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, now + noiseDuration);
  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(ctx.destination);
  noise.start(now);
  noise.stop(now + noiseDuration);

  const boing = ctx.createOscillator();
  boing.type = "sine";
  boing.frequency.setValueAtTime(140, now);
  boing.frequency.exponentialRampToValueAtTime(760, now + 0.22);
  const boingGain = ctx.createGain();
  boingGain.gain.setValueAtTime(0.0001, now);
  boingGain.gain.exponentialRampToValueAtTime(0.4, now + 0.05);
  boingGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
  boing.connect(boingGain);
  boingGain.connect(ctx.destination);
  boing.start(now);
  boing.stop(now + 0.35);
}

function updateSoundToggleUI() {
  soundToggleBtn.textContent = soundEnabled ? "🔊" : "🔇";
  soundToggleBtn.title = soundEnabled ? "効果音: ON" : "効果音: OFF";
  soundToggleBtn.classList.toggle("off", !soundEnabled);
}
soundToggleBtn.addEventListener("click", () => {
  soundEnabled = !soundEnabled;
  localStorage.setItem("barrel_sound_enabled", String(soundEnabled));
  if (soundEnabled) getAudioContext();
  updateSoundToggleUI();
});
updateSoundToggleUI();

let darkMode = localStorage.getItem("barrel_dark_mode") === "true";
function updateThemeUI() {
  themeToggleBtn.textContent = darkMode ? "☀️" : "🌙";
  themeToggleBtn.title = darkMode ? "ダークモード: ON" : "ダークモード: OFF";
  themeToggleBtn.classList.toggle("off", !darkMode);
  document.documentElement.setAttribute("data-theme", darkMode ? "dark" : "light");
}
themeToggleBtn.addEventListener("click", () => {
  darkMode = !darkMode;
  localStorage.setItem("barrel_dark_mode", String(darkMode));
  updateThemeUI();
});
updateThemeUI();

helpBtn.addEventListener("click", () => helpDialog.showModal());
closeHelpBtn.addEventListener("click", () => helpDialog.close());
helpDialog.addEventListener("click", (e) => {
  if (e.target === helpDialog) helpDialog.close();
});

function renderPlayerCountRow() {
  playerCountRow.innerHTML = "";
  for (let n = 2; n <= 5; n++) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "count-btn" + (n === playerCount ? " selected" : "");
    btn.textContent = n;
    btn.addEventListener("click", () => {
      playerCount = n;
      renderPlayerCountRow();
    });
    playerCountRow.appendChild(btn);
  }
}
renderPlayerCountRow();

function showSetupStage() {
  setupStage.hidden = false;
  gameStage.hidden = true;
  resultBannerEl.hidden = true;
  postGameControlsEl.hidden = true;
}

function buildBarrelStructure() {
  // 中央が膨らみ、上下がすぼまる樽らしいシルエットを、輪切りにしたリングを
  // 積み重ねて再現する。一部のリングは金属の「たが」として表現する。
  const staveAngle = 360 / BARREL_STAVES;
  const ringHeight = BARREL_H / BARREL_RINGS;

  for (let i = 0; i < BARREL_STAVES; i++) {
    const plankBrightness = (0.94 + Math.random() * 0.12).toFixed(2);
    for (let ring = 0; ring < BARREL_RINGS; ring++) {
      const isHoop = BARREL_HOOP_RINGS.includes(ring);
      const centerY = -BARREL_H / 2 + ringHeight * (ring + 0.5);
      const radius = barrelRadiusAt(centerY) + (isHoop ? 3 : 0);
      const segWidth = 2 * radius * Math.tan((staveAngle / 2) * Math.PI / 180) * 1.05;
      const segHeight = ringHeight + 1; // 継ぎ目の隙間を防ぐための重なり

      const seg = document.createElement("div");
      seg.className = isHoop ? "stave3d hoop3d" : "stave3d";
      seg.style.width = `${segWidth}px`;
      seg.style.height = `${segHeight}px`;
      seg.style.marginLeft = `${-segWidth / 2}px`;
      seg.style.marginTop = `${-segHeight / 2}px`;
      if (!isHoop) seg.style.filter = `brightness(${plankBrightness})`;
      seg.style.transform = `translateY(${centerY}px) rotateY(${i * staveAngle}deg) translateZ(${radius}px)`;
      barrel3dEl.appendChild(seg);
    }
  }

  const capRadius = barrelRadiusAt(-BARREL_H / 2);
  const capDiameter = capRadius * 2;
  ["top", "bottom"].forEach((position) => {
    const cap = document.createElement("div");
    cap.className = "barrel-cap";
    cap.style.width = `${capDiameter}px`;
    cap.style.height = `${capDiameter}px`;
    cap.style.marginLeft = `${-capDiameter / 2}px`;
    cap.style.marginTop = `${-capDiameter / 2}px`;
    cap.style.transform = position === "top"
      ? `rotateX(90deg) translateZ(${BARREL_H / 2}px)`
      : `rotateX(-90deg) translateZ(${BARREL_H / 2}px)`;
    barrel3dEl.appendChild(cap);
  });
}

function buildHoles() {
  barrel3dEl.querySelectorAll(".hole-btn3d").forEach((el) => el.remove());

  // 穴は「木のリング」の実際の半径にぴったり合わせて配置する。連続的な
  // 半径式で計算すると、板は段になっているため手前の板に穴の縁が
  // 隠れて欠けて見えることがあるため、そのリングの板と同じ半径を使う。
  const ringHeight = BARREL_H / BARREL_RINGS;
  const woodRings = [];
  for (let i = 0; i < BARREL_RINGS; i++) {
    if (!BARREL_HOOP_RINGS.includes(i)) woodRings.push(i);
  }
  const cols = TOTAL_HOLES / woodRings.length;
  const angleStep = 360 / cols;
  const holeOffset = 3;
  const maxJitterY = 3;

  const positions = [];
  woodRings.forEach((ring, r) => {
    const centerY = -BARREL_H / 2 + ringHeight * (ring + 0.5);
    const radius = barrelRadiusAt(centerY) + holeOffset;
    for (let c = 0; c < cols; c++) {
      const baseAngle = c * angleStep + (r % 2 === 1 ? angleStep / 2 : 0);
      const jitterY = (Math.random() - 0.5) * 2 * maxJitterY;
      const jitterAngle = (Math.random() - 0.5) * angleStep * 0.3;
      positions.push({
        y: centerY + jitterY,
        angle: baseAngle + jitterAngle,
        radius
      });
    }
  });

  positions.forEach((pos, i) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "hole-btn3d";
    btn.style.transform =
      `translateY(${pos.y.toFixed(1)}px) rotateY(${pos.angle.toFixed(1)}deg) translateZ(${pos.radius.toFixed(1)}px)`;
    btn.dataset.holeIndex = i;
    barrel3dEl.appendChild(btn);
  });
}

function renderPlayersRow() {
  playersRowEl.innerHTML = "";
  players.forEach((p, idx) => {
    const badge = document.createElement("span");
    badge.className = "player-badge" + (idx === currentPlayerIndex && !popped ? " active" : "");
    const dot = document.createElement("span");
    dot.className = "dot";
    dot.style.background = p.color;
    badge.appendChild(dot);
    badge.appendChild(document.createTextNode(p.name));
    playersRowEl.appendChild(badge);
  });
}

function updateTurnBanner() {
  if (popped) {
    turnBannerEl.textContent = "";
    return;
  }
  turnBannerEl.textContent = `${players[currentPlayerIndex].name} の番です`;
}

function updateHolesRemaining() {
  holesRemainingEl.textContent = `残り穴: ${TOTAL_HOLES - usedHolesCount} / ${TOTAL_HOLES}`;
}

function startGame() {
  players = Array.from({ length: playerCount }, (_, i) => ({
    name: `プレイヤー${i + 1}`,
    color: PLAYER_COLORS[i % PLAYER_COLORS.length]
  }));
  currentPlayerIndex = 0;
  triggerHoleId = Math.floor(Math.random() * TOTAL_HOLES);
  usedHolesCount = 0;
  holeUsed = new Array(TOTAL_HOLES).fill(false);
  popped = false;
  gameMessageEl.textContent = "";
  barrelCharacterEl.className = "barrel-character";
  barrelCharacterEl.textContent = "";
  barrelStageEl.classList.remove("shake");

  setupStage.hidden = true;
  gameStage.hidden = false;
  resultBannerEl.hidden = true;
  postGameControlsEl.hidden = true;

  buildHoles();
  renderPlayersRow();
  updateTurnBanner();
  updateHolesRemaining();
}

function onHoleClick(holeIndex, btn) {
  if (popped || holeUsed[holeIndex]) return;
  holeUsed[holeIndex] = true;
  usedHolesCount += 1;

  const currentPlayer = players[currentPlayerIndex];
  const peg = document.createElement("span");
  peg.className = "peg";
  peg.style.background = currentPlayer.color;
  btn.appendChild(peg);
  btn.disabled = true;

  if (holeIndex === triggerHoleId) {
    triggerPop(currentPlayer);
    return;
  }

  playInsertSound();
  updateHolesRemaining();
  currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
  renderPlayersRow();
  updateTurnBanner();
}

function triggerPop(loser) {
  popped = true;
  playPopSound();
  updateHolesRemaining();
  barrelCharacterEl.textContent = POP_CHARACTERS[Math.floor(Math.random() * POP_CHARACTERS.length)];
  barrelCharacterEl.classList.add("pop");
  barrelStageEl.classList.remove("shake");
  void barrelStageEl.offsetWidth;
  barrelStageEl.classList.add("shake");
  renderPlayersRow();
  updateTurnBanner();
  gameMessageEl.textContent = "";

  setTimeout(() => {
    resultBannerEl.hidden = false;
    resultBannerEl.textContent = `${loser.name} の負け!`;
    postGameControlsEl.hidden = false;
  }, 500);
}

startGameBtn.addEventListener("click", startGame);
playAgainBtn.addEventListener("click", startGame);
changeCountBtn.addEventListener("click", showSetupStage);
restartBtn.addEventListener("click", showSetupStage);
exitBtn.addEventListener("click", () => {
  window.location.href = "index.html";
});

// マウス/タッチのドラッグで樽を3D回転させる。
let spinDeg = 20;
let tiltDeg = -14;
let dragState = null;

function applyBarrelTransform() {
  barrel3dEl.style.transform = `translate(-50%, -50%) rotateX(${tiltDeg}deg) rotateY(${spinDeg}deg)`;
}
applyBarrelTransform();

barrelStageEl.addEventListener("pointerdown", (e) => {
  barrel3dEl.style.transition = "";
  barrelStageEl.setPointerCapture(e.pointerId);
  dragState = {
    startX: e.clientX,
    startY: e.clientY,
    spinStart: spinDeg,
    tiltStart: tiltDeg,
    moved: false,
    targetHole: e.target.closest(".hole-btn3d")
  };
});

function rotateBarrelBy(deltaDeg) {
  barrel3dEl.style.transition = "transform 350ms ease";
  spinDeg += deltaDeg;
  applyBarrelTransform();
}
rotateLeftBtn.addEventListener("click", () => rotateBarrelBy(-45));
rotateRightBtn.addEventListener("click", () => rotateBarrelBy(45));

barrelStageEl.addEventListener("pointermove", (e) => {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  if (!dragState.moved && Math.hypot(dx, dy) > 6) dragState.moved = true;
  if (dragState.moved) {
    spinDeg = dragState.spinStart + dx * 0.4;
    tiltDeg = Math.max(-70, Math.min(15, dragState.tiltStart - dy * 0.3));
    applyBarrelTransform();
  }
});

function endBarrelDrag(e) {
  if (!dragState) return;
  if (!dragState.moved && dragState.targetHole) {
    const idx = Number(dragState.targetHole.dataset.holeIndex);
    onHoleClick(idx, dragState.targetHole);
  }
  dragState = null;
}
barrelStageEl.addEventListener("pointerup", endBarrelDrag);
barrelStageEl.addEventListener("pointercancel", endBarrelDrag);
window.addEventListener("keydown", (e) => {
  if (e.code === "KeyR") showSetupStage();
  if (e.code === "KeyE") window.location.href = "index.html";
});

buildBarrelStructure();
showSetupStage();
  </script>
</body>
