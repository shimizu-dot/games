<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>テトリス</title>
  <style>
    :root {
      --bg1: #0b1020;
      --bg2: #1e1b4b;
      --panel: #0f172a;
      --line: #334155;
      --ink: #e2e8f0;
      --accent: #22d3ee;
      --danger: #fb7185;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Trebuchet MS", "Yu Gothic", sans-serif;
      background:
        radial-gradient(circle at 20% 15%, #1d4ed8 0%, transparent 35%),
        radial-gradient(circle at 80% 80%, #7c3aed 0%, transparent 40%),
        linear-gradient(145deg, var(--bg1), var(--bg2));
      color: var(--ink);
      padding: 16px;
    }
    .app {
      width: min(980px, 100%);
      background: rgba(15, 23, 42, 0.86);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(6px);
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 14px;
    }
    .board-wrap {
      border: 2px solid var(--line);
      border-radius: 12px;
      padding: 8px;
      background: linear-gradient(#0a1328, #111827);
    }
    #board {
      display: block;
      width: 100%;
      max-height: 80vh;
      height: auto;
      border-radius: 8px;
      background: #020617;
    }
    .side {
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
    }
    .title {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0.04em;
      color: #67e8f9;
    }
    .meta {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .pill {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 8px;
      font-weight: 700;
      font-size: 14px;
    }
    .pill .v {
      display: block;
      margin-top: 4px;
      font-size: 20px;
      color: #fff;
    }
    #next {
      display: block;
      width: 100%;
      max-width: 160px;
      aspect-ratio: 1/1;
      background: #020617;
      border-radius: 10px;
      border: 1px solid #1f2937;
      margin-top: 8px;
    }
    .btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(90deg, #0284c7, #22d3ee);
    }
    .btn.alt {
      background: linear-gradient(90deg, #be185d, #fb7185);
    }
    .controls {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .controls button {
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 10px;
      padding: 10px;
      font-size: 16px;
      font-weight: 700;
    }
    .hint {
      line-height: 1.6;
      font-size: 13px;
      color: #cbd5e1;
    }
    @media (max-width: 850px) {
      .app { grid-template-columns: 1fr; }
      #board { max-height: 65vh; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="board-wrap">
      <canvas id="board" width="300" height="600" aria-label="テトリス盤面"></canvas>
    </div>
    <div class="side">
      <div class="card">
        <h1 class="title">TETRIS</h1>
        <div class="meta">
          <div class="pill">SCORE<span id="score" class="v">0</span></div>
          <div class="pill">BEST<span id="best" class="v">0</span></div>
          <div class="pill">LINES<span id="lines" class="v">0</span></div>
          <div class="pill">LEVEL<span id="level" class="v">1</span></div>
        </div>
      </div>

      <div class="card">
        <div style="font-weight:700">NEXT</div>
        <canvas id="next" width="160" height="160" aria-label="次のミノ"></canvas>
      </div>

      <div class="card" style="display:grid; gap:8px;">
        <button id="restart" class="btn">リスタート</button>
        <button id="pause" class="btn alt">一時停止</button>
      </div>

      <div class="card">
        <div class="controls">
          <button data-act="left">←</button>
          <button data-act="rotate">⟳</button>
          <button data-act="right">→</button>
          <button data-act="down">↓</button>
          <button data-act="drop" style="grid-column: span 2;">DROP</button>
        </div>
      </div>

      <div class="card hint">
        ←/→: 移動<br>
        ↑ or X: 回転<br>
        ↓: ソフトドロップ<br>
        Space: ハードドロップ<br>
        P: 一時停止
      </div>
    </div>
  </div>

  <script>
    (() => {
      const COLS = 10;
      const ROWS = 20;
      const BLOCK = 30;

      const boardCanvas = document.getElementById("board");
      const bctx = boardCanvas.getContext("2d");
      const nextCanvas = document.getElementById("next");
      const nctx = nextCanvas.getContext("2d");

      const scoreEl = document.getElementById("score");
      const bestEl = document.getElementById("best");
      const linesEl = document.getElementById("lines");
      const levelEl = document.getElementById("level");
      const restartBtn = document.getElementById("restart");
      const pauseBtn = document.getElementById("pause");

      const SHAPES = {
        I: [[1, 1, 1, 1]],
        O: [[1, 1], [1, 1]],
        T: [[0, 1, 0], [1, 1, 1]],
        S: [[0, 1, 1], [1, 1, 0]],
        Z: [[1, 1, 0], [0, 1, 1]],
        J: [[1, 0, 0], [1, 1, 1]],
        L: [[0, 0, 1], [1, 1, 1]]
      };

      const COLORS = {
        I: "#22d3ee",
        O: "#facc15",
        T: "#a78bfa",
        S: "#34d399",
        Z: "#fb7185",
        J: "#60a5fa",
        L: "#fb923c"
      };

      let board = createBoard();
      let bag = [];
      let current = null;
      let next = null;

      let score = 0;
      let lines = 0;
      let level = 1;
      let best = Number(localStorage.getItem("tetris-best") || 0);
      bestEl.textContent = String(best);

      let gameOver = false;
      let paused = false;
      let lastTime = 0;
      let dropCounter = 0;

      function createBoard() {
        return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
      }

      function cloneMatrix(m) {
        return m.map((r) => r.slice());
      }

      function rotate(matrix) {
        const h = matrix.length;
        const w = matrix[0].length;
        const out = Array.from({ length: w }, () => Array(h).fill(0));
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            out[x][h - y - 1] = matrix[y][x];
          }
        }
        return out;
      }

      function makeBag() {
        const keys = Object.keys(SHAPES);
        for (let i = keys.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [keys[i], keys[j]] = [keys[j], keys[i]];
        }
        return keys;
      }

      function pullType() {
        if (bag.length === 0) bag = makeBag();
        return bag.pop();
      }

      function newPiece(type) {
        const shape = cloneMatrix(SHAPES[type]);
        return {
          type,
          color: COLORS[type],
          matrix: shape,
          x: Math.floor((COLS - shape[0].length) / 2),
          y: 0
        };
      }

      function collide(p, offX = 0, offY = 0, mat = p.matrix) {
        for (let y = 0; y < mat.length; y++) {
          for (let x = 0; x < mat[y].length; x++) {
            if (!mat[y][x]) continue;
            const nx = p.x + x + offX;
            const ny = p.y + y + offY;
            if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
            if (ny >= 0 && board[ny][nx]) return true;
          }
        }
        return false;
      }

      function mergePiece() {
        for (let y = 0; y < current.matrix.length; y++) {
          for (let x = 0; x < current.matrix[y].length; x++) {
            if (!current.matrix[y][x]) continue;
            const by = current.y + y;
            const bx = current.x + x;
            if (by >= 0) board[by][bx] = current.type;
          }
        }
      }

      function clearLines() {
        let cleared = 0;
        for (let y = ROWS - 1; y >= 0; y--) {
          if (board[y].every((v) => v !== 0)) {
            board.splice(y, 1);
            board.unshift(Array(COLS).fill(0));
            cleared++;
            y++;
          }
        }

        if (cleared > 0) {
          const linePoints = [0, 100, 300, 500, 800];
          score += linePoints[cleared] * level;
          lines += cleared;
          level = Math.floor(lines / 10) + 1;
          updateStats();
        }
      }

      function lockAndSpawn() {
        mergePiece();
        clearLines();
        current = next;
        next = newPiece(pullType());
        if (collide(current, 0, 0)) {
          gameOver = true;
          paused = false;
          pauseBtn.textContent = "一時停止";
        }
      }

      function move(dx) {
        if (gameOver || paused) return;
        if (!collide(current, dx, 0)) current.x += dx;
      }

      function softDrop() {
        if (gameOver || paused) return;
        if (!collide(current, 0, 1)) {
          current.y++;
          score += 1;
          updateStats();
        } else {
          lockAndSpawn();
        }
        dropCounter = 0;
      }

      function hardDrop() {
        if (gameOver || paused) return;
        let dropped = 0;
        while (!collide(current, 0, 1)) {
          current.y++;
          dropped++;
        }
        score += dropped * 2;
        updateStats();
        lockAndSpawn();
        dropCounter = 0;
      }

      function rotateCurrent() {
        if (gameOver || paused) return;
        const rotated = rotate(current.matrix);
        const kicks = [0, -1, 1, -2, 2];
        for (const k of kicks) {
          if (!collide(current, k, 0, rotated)) {
            current.matrix = rotated;
            current.x += k;
            return;
          }
        }
      }

      function dropInterval() {
        return Math.max(90, 900 - (level - 1) * 70);
      }

      function drawBlock(ctx, x, y, color, size) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, size, size);
        ctx.strokeStyle = "rgba(2,6,23,0.7)";
        ctx.lineWidth = 2;
        ctx.strokeRect(x + 1, y + 1, size - 2, size - 2);
        ctx.fillStyle = "rgba(255,255,255,0.22)";
        ctx.fillRect(x + 2, y + 2, size - 8, 5);
      }

      function drawBoard() {
        bctx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);
        bctx.fillStyle = "#020617";
        bctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);

        for (let y = 0; y < ROWS; y++) {
          for (let x = 0; x < COLS; x++) {
            const cell = board[y][x];
            if (!cell) continue;
            drawBlock(bctx, x * BLOCK, y * BLOCK, COLORS[cell], BLOCK);
          }
        }

        if (!current) return;

        let ghostY = current.y;
        while (!collide(current, 0, ghostY - current.y + 1, current.matrix)) {
          ghostY++;
        }

        for (let y = 0; y < current.matrix.length; y++) {
          for (let x = 0; x < current.matrix[y].length; x++) {
            if (!current.matrix[y][x]) continue;
            const gx = (current.x + x) * BLOCK;
            const gy = (ghostY + y) * BLOCK;
            bctx.fillStyle = "rgba(148,163,184,0.25)";
            bctx.fillRect(gx + 3, gy + 3, BLOCK - 6, BLOCK - 6);
          }
        }

        for (let y = 0; y < current.matrix.length; y++) {
          for (let x = 0; x < current.matrix[y].length; x++) {
            if (!current.matrix[y][x]) continue;
            const bx = (current.x + x) * BLOCK;
            const by = (current.y + y) * BLOCK;
            drawBlock(bctx, bx, by, current.color, BLOCK);
          }
        }

        if (paused || gameOver) {
          bctx.fillStyle = "rgba(2,6,23,0.64)";
          bctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);
          bctx.textAlign = "center";
          bctx.fillStyle = gameOver ? "#fb7185" : "#e2e8f0";
          bctx.font = "bold 38px Trebuchet MS";
          bctx.fillText(gameOver ? "GAME OVER" : "PAUSED", boardCanvas.width / 2, boardCanvas.height / 2 - 10);
          bctx.font = "bold 18px Trebuchet MS";
          bctx.fillStyle = "#e2e8f0";
          bctx.fillText("リスタートで再開", boardCanvas.width / 2, boardCanvas.height / 2 + 26);
          bctx.textAlign = "start";
        }
      }

      function drawNext() {
        nctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
        nctx.fillStyle = "#020617";
        nctx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
        if (!next) return;

        const mat = next.matrix;
        const s = 26;
        const w = mat[0].length * s;
        const h = mat.length * s;
        const sx = (nextCanvas.width - w) / 2;
        const sy = (nextCanvas.height - h) / 2;

        for (let y = 0; y < mat.length; y++) {
          for (let x = 0; x < mat[y].length; x++) {
            if (!mat[y][x]) continue;
            drawBlock(nctx, sx + x * s, sy + y * s, next.color, s);
          }
        }
      }

      function updateStats() {
        scoreEl.textContent = String(score);
        linesEl.textContent = String(lines);
        levelEl.textContent = String(level);

        if (score > best) {
          best = score;
          bestEl.textContent = String(best);
          localStorage.setItem("tetris-best", String(best));
        }
      }

      function resetGame() {
        board = createBoard();
        bag = [];
        score = 0;
        lines = 0;
        level = 1;
        gameOver = false;
        paused = false;
        pauseBtn.textContent = "一時停止";
        current = newPiece(pullType());
        next = newPiece(pullType());
        dropCounter = 0;
        updateStats();
      }

      function togglePause() {
        if (gameOver) return;
        paused = !paused;
        pauseBtn.textContent = paused ? "再開" : "一時停止";
      }

      function update(ts = 0) {
        const delta = ts - lastTime;
        lastTime = ts;

        if (!gameOver && !paused) {
          dropCounter += delta;
          if (dropCounter > dropInterval()) {
            if (!collide(current, 0, 1)) current.y++;
            else lockAndSpawn();
            dropCounter = 0;
          }
        }

        drawBoard();
        drawNext();
        requestAnimationFrame(update);
      }

      window.addEventListener("keydown", (e) => {
        if (e.repeat) return;
        if (e.code === "ArrowLeft") move(-1);
        else if (e.code === "ArrowRight") move(1);
        else if (e.code === "ArrowDown") softDrop();
        else if (e.code === "ArrowUp" || e.code === "KeyX") rotateCurrent();
        else if (e.code === "Space") {
          e.preventDefault();
          hardDrop();
        } else if (e.code === "KeyP") {
          togglePause();
        }
      });

      restartBtn.addEventListener("click", resetGame);
      pauseBtn.addEventListener("click", togglePause);

      document.querySelectorAll("[data-act]").forEach((btn) => {
        const run = () => {
          const act = btn.getAttribute("data-act");
          if (act === "left") move(-1);
          if (act === "right") move(1);
          if (act === "rotate") rotateCurrent();
          if (act === "down") softDrop();
          if (act === "drop") hardDrop();
        };
        btn.addEventListener("click", run);
        btn.addEventListener("touchstart", (e) => {
          e.preventDefault();
          run();
        }, { passive: false });
      });

      resetGame();
      requestAnimationFrame(update);
    })();
  </script>
</body>
</html>
