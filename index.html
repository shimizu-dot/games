<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ゲーム一覧</title>
  <style>
    :root {
      --ink: #171821;
      --paper: #fffdf4;
      --cabinet: #ff3d7f;
      --screen: #16213e;
      --cyan: #3ddcff;
      --yellow: #ffd447;
      --green: #61e294;
      --pink: #ff71ce;
      --orange: #ff9f1c;
      --shadow: #10121a;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: #20c7b7;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 18px;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      color: var(--ink);
      background:
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.18) 0 2px, transparent 2px 40px),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.18) 0 2px, transparent 2px 40px),
        linear-gradient(135deg, #ffe156 0%, #20c7b7 48%, #4d96ff 100%);
    }

    main {
      width: min(100%, 1060px);
      border: 6px solid var(--shadow);
      border-radius: 22px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.2) 0 12px, transparent 12px 24px),
        var(--cabinet);
      box-shadow: 0 14px 0 var(--shadow), 0 26px 48px rgba(16, 18, 26, 0.28);
      padding: 18px;
    }

    .screen {
      border: 4px solid var(--shadow);
      border-radius: 14px;
      background:
        linear-gradient(rgba(255, 255, 255, 0.06) 50%, rgba(0, 0, 0, 0.05) 50%),
        var(--screen);
      background-size: 100% 8px, auto;
      padding: 18px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      color: #fff;
      font-size: 2.3rem;
      line-height: 1.1;
      text-shadow: 4px 4px 0 #000;
    }

    .marquee {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      padding: 8px 14px;
      border: 3px solid var(--shadow);
      border-radius: 8px;
      background: var(--yellow);
      box-shadow: 4px 4px 0 var(--shadow);
      color: var(--shadow);
      font-size: 0.85rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .game-link {
      display: grid;
      grid-template-rows: 108px 1fr 40px;
      gap: 12px;
      min-height: 250px;
      padding: 14px;
      color: var(--ink);
      text-decoration: none;
      border: 4px solid var(--shadow);
      border-radius: 8px;
      box-shadow: 0 8px 0 var(--shadow);
      transition: transform 140ms ease, box-shadow 140ms ease;
    }

    .game-link:hover,
    .game-link:focus-visible {
      transform: translateY(-4px);
      box-shadow: 0 12px 0 var(--shadow);
    }

    .game-link:focus-visible {
      outline: 4px solid #fff;
      outline-offset: 3px;
    }

    .game-link:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 var(--shadow);
    }

    .game-link:nth-child(1) {
      background: #fff0a8;
    }

    .game-link:nth-child(2) {
      background: #b9f6ff;
    }

    .game-link:nth-child(3) {
      background: #ffd0df;
    }

    .game-link:nth-child(4) {
      background: #c7f9cc;
    }

    .preview {
      position: relative;
      overflow: hidden;
      border: 3px solid var(--shadow);
      border-radius: 8px;
      background: var(--paper);
    }

    .copy {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .copy small {
      width: fit-content;
      padding: 4px 8px;
      border: 2px solid var(--shadow);
      border-radius: 6px;
      background: #fff;
      box-shadow: 3px 3px 0 var(--shadow);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .copy span {
      font-size: 1.34rem;
      font-weight: 900;
      line-height: 1.18;
      overflow-wrap: anywhere;
    }

    .play {
      display: grid;
      place-items: center;
      border: 3px solid var(--shadow);
      border-radius: 999px;
      background: var(--shadow);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .suika-art {
      background: linear-gradient(#fff7c2 0 62%, #f7b267 62% 100%);
    }

    .fruit {
      position: absolute;
      display: block;
      border: 3px solid var(--shadow);
      border-radius: 50%;
      box-shadow: inset -5px -6px 0 rgba(0, 0, 0, 0.12);
    }

    .fruit.big {
      width: 54px;
      height: 54px;
      left: 58px;
      bottom: 8px;
      background: #45c95a;
    }

    .fruit.mid {
      width: 40px;
      height: 40px;
      left: 22px;
      bottom: 12px;
      background: #ff5f7e;
    }

    .fruit.small {
      width: 30px;
      height: 30px;
      right: 18px;
      bottom: 42px;
      background: #ffd23f;
    }

    .tetris-art {
      display: grid;
      grid-template-columns: repeat(4, 20px);
      grid-template-rows: repeat(4, 20px);
      place-content: center;
      gap: 5px;
      background: #151a35;
    }

    .block {
      width: 20px;
      height: 20px;
      border: 3px solid var(--shadow);
      box-shadow: inset 3px 3px 0 rgba(255, 255, 255, 0.38);
    }

    .block.cyan { background: var(--cyan); }
    .block.yellow { background: var(--yellow); }
    .block.pink { background: var(--pink); }
    .block.green { background: var(--green); }
    .block.orange { background: var(--orange); }

    .bomber-art {
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.28) 0 8px, transparent 8px 16px),
        #5046e5;
    }

    .bomb {
      position: absolute;
      width: 62px;
      height: 62px;
      left: 50%;
      bottom: 18px;
      border: 4px solid var(--shadow);
      border-radius: 50%;
      background: #242633;
      box-shadow: inset -8px -9px 0 #10121a;
      transform: translateX(-50%);
    }

    .bomb::before {
      content: "";
      position: absolute;
      width: 28px;
      height: 14px;
      left: 38px;
      top: -8px;
      border: 4px solid var(--shadow);
      border-bottom: 0;
      border-radius: 16px 16px 0 0;
      transform: rotate(32deg);
    }

    .bomb::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      right: -24px;
      top: -18px;
      border: 3px solid var(--shadow);
      background: var(--yellow);
      box-shadow: 8px 7px 0 var(--orange), -7px 8px 0 #fff;
      transform: rotate(15deg);
    }

    .board-art {
      display: grid;
      grid-template-columns: repeat(5, 22px);
      grid-template-rows: repeat(4, 18px);
      place-content: center;
      gap: 5px;
      background: #f6fff4;
    }

    .step {
      border: 3px solid var(--shadow);
      border-radius: 5px;
      background: #fff;
    }

    .step.start { background: var(--green); }
    .step.goal { background: var(--yellow); }
    .step.dice {
      position: relative;
      background: #fff;
    }

    .step.dice::before {
      content: "";
      position: absolute;
      width: 5px;
      height: 5px;
      left: 5px;
      top: 4px;
      border-radius: 50%;
      background: var(--shadow);
      box-shadow: 8px 5px 0 var(--shadow), 4px 10px 0 var(--shadow);
    }

    .game-link:nth-child(5) {
      background: #e3d4ff;
    }

    .game-link:nth-child(6) {
      background: #cfe8ff;
    }

    .game-link:nth-child(7) {
      background: #ffe0b2;
    }

    .game-link:nth-child(8) {
      background: #ffd6d6;
    }

    .game-link.coming-soon {
      background: #e4e6ea;
      cursor: default;
    }

    .game-link.coming-soon:hover,
    .game-link.coming-soon:focus-visible,
    .game-link.coming-soon:active {
      transform: none;
      box-shadow: 0 8px 0 var(--shadow);
    }

    .soon-art {
      display: grid;
      place-items: center;
      background: repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.06) 0 10px, transparent 10px 20px);
    }

    .soon-icon {
      font-size: 2.4rem;
      opacity: 0.6;
    }

    .soon-badge {
      background: #9aa0aa;
      color: #fff;
    }

    .pacman-art {
      position: relative;
      background: #0b1020;
    }

    .pacman {
      position: absolute;
      width: 46px;
      height: 46px;
      left: 20px;
      bottom: 20px;
      background: var(--yellow);
      border-radius: 50%;
    }

    .pacman::before {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      right: -2px;
      top: 11px;
      border-style: solid;
      border-width: 12px 24px 12px 0;
      border-color: transparent #0b1020 transparent transparent;
    }

    .pac-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffe9a8;
    }

    .pac-dot.d1 {
      right: 28px;
      bottom: 42px;
    }

    .pac-dot.d2 {
      right: 14px;
      bottom: 42px;
    }

    .battle-art {
      position: relative;
      background: linear-gradient(180deg, #bfe3ff 0 55%, #1e5f91 55% 100%);
    }

    .battle-ship {
      position: absolute;
      width: 68px;
      height: 20px;
      left: 18px;
      bottom: 14px;
      background: #3a4a63;
      border: 3px solid var(--shadow);
      border-radius: 6px 14px 6px 6px;
    }

    .battle-ship::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      top: -12px;
      left: 20px;
      background: #3a4a63;
      border: 3px solid var(--shadow);
      border-radius: 3px 3px 0 0;
    }

    .hit-mark {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--shadow);
      background: var(--pink);
    }

    .hit-mark.m1 { left: 14px; top: 14px; }
    .hit-mark.m2 { left: 40px; top: 26px; background: var(--yellow); }
    .hit-mark.m3 { right: 16px; top: 16px; background: #fff; }

    .janken-art {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(160deg, #ffe0b2 0%, #ffcc80 100%);
    }

    .janken-art .fist {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 3px solid var(--shadow);
      box-shadow: inset -5px -6px 0 rgba(0, 0, 0, 0.15);
    }

    .janken-art .fist-left { background: var(--pink); }
    .janken-art .fist-right { background: var(--green); }

    .janken-art .vs-spark {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 3px solid var(--shadow);
      background: #fff;
      box-shadow: 3px 3px 0 var(--shadow);
      font-size: 0.7rem;
      font-weight: 900;
      color: var(--shadow);
    }

    .barrel-art {
      position: relative;
      background: radial-gradient(circle at 35% 30%, #e8b96a, #a8703a 75%);
    }

    .barrel-art .band {
      position: absolute;
      left: 0;
      right: 0;
      height: 6px;
      background: rgba(0, 0, 0, 0.22);
    }

    .barrel-art .band.b1 { top: 26px; }
    .barrel-art .band.b2 { bottom: 26px; }

    .barrel-art .peek {
      position: absolute;
      left: 50%;
      top: 20px;
      transform: translateX(-50%);
      font-size: 30px;
    }

    .barrel-art .sword {
      position: absolute;
      width: 34px;
      height: 8px;
      right: 20px;
      bottom: 24px;
      background: linear-gradient(135deg, #f2f2f2, #b9b9b9);
      border: 2px solid var(--shadow);
      border-radius: 2px;
      transform: rotate(-25deg);
    }

    @media (max-width: 900px) {
      .games {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      body {
        align-items: stretch;
        padding: 10px;
      }

      main {
        border-width: 4px;
        border-radius: 16px;
        box-shadow: 0 8px 0 var(--shadow), 0 18px 32px rgba(16, 18, 26, 0.24);
        padding: 10px;
      }

      .screen {
        min-height: calc(100dvh - 40px);
        border-width: 3px;
        padding: 12px;
      }

      .top {
        align-items: stretch;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 14px;
      }

      h1 {
        font-size: 1.65rem;
        text-shadow: 3px 3px 0 #000;
      }

      .marquee {
        justify-content: center;
        min-height: 38px;
      }

      .games {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .game-link {
        grid-template-columns: 78px minmax(0, 1fr);
        grid-template-rows: auto auto;
        align-items: center;
        min-height: 112px;
        padding: 10px;
        gap: 10px;
        box-shadow: 0 6px 0 var(--shadow);
      }

      .preview {
        grid-row: 1 / span 2;
        width: 78px;
        height: 78px;
      }

      .copy {
        min-width: 0;
      }

      .copy small {
        font-size: 0.72rem;
      }

      .copy span {
        font-size: 1.05rem;
      }

      .play {
        grid-column: 2;
        justify-self: start;
        width: 62px;
        height: 32px;
        font-size: 0.78rem;
      }

      .fruit.big {
        width: 38px;
        height: 38px;
        left: 33px;
      }

      .fruit.mid {
        width: 30px;
        height: 30px;
        left: 8px;
      }

      .fruit.small {
        width: 22px;
        height: 22px;
        right: 7px;
        bottom: 34px;
      }

      .tetris-art {
        grid-template-columns: repeat(4, 15px);
        grid-template-rows: repeat(4, 15px);
        gap: 3px;
      }

      .block {
        width: 15px;
        height: 15px;
        border-width: 2px;
      }

      .bomb {
        width: 44px;
        height: 44px;
        bottom: 16px;
      }

      .board-art {
        grid-template-columns: repeat(5, 11px);
        grid-template-rows: repeat(4, 11px);
        gap: 2px;
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="screen">
      <div class="top">
        <h1>ゲームセレクト</h1>
        <div class="marquee">ARCADE MENU</div>
      </div>
      <nav class="games" aria-label="ゲーム一覧">
        <a class="game-link" href="game1.html">
          <div class="preview suika-art" aria-hidden="true">
            <span class="fruit big"></span>
            <span class="fruit mid"></span>
            <span class="fruit small"></span>
          </div>
          <div class="copy">
            <small>GAME 1</small>
            <span>スイカゲーム風</span>
          </div>
          <b class="play">PLAY</b>
        </a>
        <a class="game-link" href="game2.html">
          <div class="preview tetris-art" aria-hidden="true">
            <span class="block cyan"></span>
            <span class="block cyan"></span>
            <span class="block yellow"></span>
            <span class="block pink"></span>
            <span class="block green"></span>
            <span class="block cyan"></span>
            <span class="block yellow"></span>
            <span class="block pink"></span>
            <span class="block green"></span>
            <span class="block orange"></span>
            <span class="block orange"></span>
            <span class="block pink"></span>
            <span class="block green"></span>
            <span class="block green"></span>
            <span class="block orange"></span>
            <span class="block yellow"></span>
          </div>
          <div class="copy">
            <small>GAME 2</small>
            <span>テトリス風</span>
          </div>
          <b class="play">PLAY</b>
        </a>
        <a class="game-link" href="game3.html">
          <div class="preview bomber-art" aria-hidden="true">
            <span class="bomb"></span>
          </div>
          <div class="copy">
            <small>GAME 3</small>
            <span>ボンバーマン風</span>
          </div>
          <b class="play">PLAY</b>
        </a>
        <a class="game-link" href="game4.html">
          <div class="preview board-art" aria-hidden="true">
            <span class="step start"></span>
            <span class="step"></span>
            <span class="step"></span>
            <span class="step dice"></span>
            <span class="step"></span>
            <span class="step"></span>
            <span class="step dice"></span>
            <span class="step"></span>
            <span class="step"></span>
            <span class="step"></span>
            <span class="step"></span>
            <span class="step"></span>
            <span class="step dice"></span>
            <span class="step"></span>
            <span class="step"></span>
            <span class="step"></span>
            <span class="step"></span>
            <span class="step"></span>
            <span class="step"></span>
            <span class="step goal"></span>
          </div>
          <div class="copy">
            <small>GAME 4</small>
            <span>30マスすごろく</span>
          </div>
          <b class="play">PLAY</b>
        </a>
        <a class="game-link" href="game5.html">
          <div class="preview pacman-art" aria-hidden="true">
            <span class="pac-dot d1"></span>
            <span class="pac-dot d2"></span>
            <span class="pacman"></span>
          </div>
          <div class="copy">
            <small>GAME 5</small>
            <span>パックマン風</span>
          </div>
          <b class="play">PLAY</b>
        </a>
        <a class="game-link" href="game6.html">
          <div class="preview battle-art" aria-hidden="true">
            <span class="hit-mark m1"></span>
            <span class="hit-mark m2"></span>
            <span class="hit-mark m3"></span>
            <span class="battle-ship"></span>
          </div>
          <div class="copy">
            <small>GAME 6</small>
            <span>対戦型 戦艦ゲーム</span>
          </div>
          <b class="play">PLAY</b>
        </a>
        <a class="game-link" href="game7.html">
          <div class="preview janken-art" aria-hidden="true">
            <span class="fist fist-left"></span>
            <span class="vs-spark">VS</span>
            <span class="fist fist-right"></span>
          </div>
          <div class="copy">
            <small>GAME 7</small>
            <span>じゃんけん ﾌｧｲﾀｰ</span>
          </div>
          <b class="play">PLAY</b>
        </a>
        <a class="game-link" href="game8.html">
          <div class="preview barrel-art" aria-hidden="true">
            <span class="band b1"></span>
            <span class="band b2"></span>
            <span class="peek">🏴‍☠️</span>

          </div>
          <div class="copy">
            <small>GAME 8</small>
            <span>危機一髪風</span>
          </div>
          <b class="play">PLAY</b>
        </a>
        <div class="game-link coming-soon" aria-disabled="true">
          <div class="preview soon-art" aria-hidden="true">
            <span class="soon-icon">➕</span>
          </div>
          <div class="copy">
            <small>NEXT GAME</small>
            <span>Coming soon...</span>
          </div>
          <b class="play soon-badge">SOON</b>
        </div>
      </nav>
    </div>
  </main>
</body>

</html>
