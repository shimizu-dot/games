<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ゲーム一覧</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      color: #172033;
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 196, 87, 0.25), transparent 28%),
        radial-gradient(circle at 84% 20%, rgba(71, 180, 255, 0.22), transparent 30%),
        linear-gradient(135deg, #f7fbff, #eef4f8 48%, #fff7e8);
    }

    main {
      width: min(100%, 720px);
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(28px, 7vw, 44px);
      line-height: 1.1;
      text-align: center;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }

    .game-link {
      display: grid;
      gap: 10px;
      min-height: 132px;
      padding: 20px;
      color: inherit;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(23, 32, 51, 0.14);
      border-radius: 8px;
      box-shadow: 0 16px 36px rgba(23, 32, 51, 0.12);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .game-link:hover,
    .game-link:focus-visible {
      transform: translateY(-3px);
      border-color: rgba(23, 32, 51, 0.32);
      box-shadow: 0 20px 42px rgba(23, 32, 51, 0.18);
      outline: none;
    }

    .game-link span {
      align-self: end;
      font-size: 24px;
      font-weight: 800;
    }

    .game-link small {
      color: #5c677a;
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <main>
    <h1>ゲーム一覧</h1>
    <nav class="games" aria-label="ゲーム一覧">
      <a class="game-link" href="game1.html">
        <small>GAME 1</small>
        <span>スイカゲーム風</span>
      </a>
      <a class="game-link" href="game2.html">
        <small>GAME 2</small>
        <span>テトリス風</span>
      </a>
      <a class="game-link" href="game3.html">
        <small>GAME 3</small>
        <span>ボンバーマン風</span>
      </a>
    </nav>
  </main>
</body>

</html>
